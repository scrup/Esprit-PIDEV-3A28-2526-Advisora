# config/services.yaml

parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      
        autoconfigure: true 

    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # This is the "Force Fix" for your UserController
    App\Controller\Back\UserController:
        autowire: true
        autoconfigure: true
        tags: ['controller.service_arguments']